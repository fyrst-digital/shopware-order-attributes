name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Shopware CLI
        uses: shopware/shopware-cli-action@v3

      - name: Validate plugin
        run: shopware-cli extension validate . --full --reporter github
